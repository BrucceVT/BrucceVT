<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Brucce Villena Terreros - Full Stack Developer</title>
  <desc id="desc">Professional navy banner with cyan and violet accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="0.55" stop-color="#0B1F3A"/>
      <stop offset="1" stop-color="#111B38"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#93C5FD" stroke-opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="24" fill="url(#grid)"/>

  <circle cx="1035" cy="64" r="155" fill="#22D3EE" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1135" cy="280" r="190" fill="#8B5CF6" opacity="0.10" filter="url(#glow)"/>
  <path d="M790 248C900 160 1000 170 1200 84" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.32"/>
  <path d="M850 286C975 215 1060 220 1200 170" fill="none" stroke="#22D3EE" stroke-width="1.5" opacity="0.22"/>

  <g transform="translate(72 65)">
    <rect x="0" y="0" width="8" height="190" rx="4" fill="url(#accent)"/>
    <text x="36" y="56" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="0.4">Brucce Villena Terreros</text>
    <text x="36" y="104" fill="#C7D2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="600">Full Stack Developer</text>
    <text x="36" y="145" fill="#67E8F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="500">Oracle APEX · React · Flutter</text>
    <text x="36" y="185" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Arequipa, Peru  ·  Building scalable web, mobile and business solutions</text>
  </g>

  <g transform="translate(935 112)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 48L54 0l54 48-54 48z" stroke="#22D3EE" stroke-width="3" opacity="0.9"/>
    <path d="M54 0v96M0 48h108" stroke="#8B5CF6" stroke-width="2" opacity="0.8"/>
    <circle cx="54" cy="48" r="13" fill="#0B1F3A" stroke="#F8FAFC" stroke-width="2"/>
  </g>
</svg>
